<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Credit Scoring - Bejelentkezés</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: #fff; border-radius: 12px; padding: 40px; width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        .brand-icon { font-size: 3rem; color: #1a1a2e; }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div class="login-card text-center">
    <i class="bi bi-bank2 brand-icon"></i>
    <h4 class="mt-3 mb-1">Credit Scoring</h4>
    <p class="text-muted mb-4">Admin Felület</p>
    {% for cat, msg in get_flashed_messages(with_categories=True) %}
    <div class="alert alert-danger">{{ msg }}</div>
    {% endfor %}
    <form method="POST">
        <div class="mb-3 text-start">
            <label class="form-label">Felhasználónév</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label">Jelszó</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-dark w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i>Bejelentkezés
        </button>
    </form>
</div>
</body>
</html>
